              "@type": "Question",
              "name": "Which PSX brokers are supported?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "PSXL supports CSV import from AKD Securities, JS Global, Topline Securities, Arif Habib, and most other PSX brokers."
